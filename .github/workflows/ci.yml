name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  OPENAI_API_KEY: test-ci-placeholder

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run quality gate
        run: npm run check

  postgres-integration:
    name: PostgreSQL integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.4-alpine3.23
        env:
          POSTGRES_DB: enterprise_learning_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d enterprise_learning_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_ENGINE: postgres
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/enterprise_learning_test
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run PostgreSQL integration tests
        run: npm run test:postgres
